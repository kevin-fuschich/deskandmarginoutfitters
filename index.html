<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Desk &amp; Margin Outfitters</title>
  <meta name="description" content="Culture is built in the margins. We design tools that help teams protect what matters and build what’s next." />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root{
      --ink:#111111;
      --paper:#f2f0ec;
      --field:#fffdf8;
      --muted:#6f6a63;
      --line:#e6e3de;
      --soft:#f6f3ee;

      --serif:"Georgia","Times New Roman",serif;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;

      --max:1080px;
      --radius:16px;
      --shadow:0 18px 40px rgba(0,0,0,0.10);
      --shadow-soft:0 10px 22px rgba(0,0,0,0.08);

      --btn:#111111;
      --btnText:#ffffff;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      font-family:var(--sans);
      background:var(--paper);
      color:var(--ink);
      line-height:1.7;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{ color:inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }

    .wrap{
      width:100%;
      max-width:var(--max);
      margin:0 auto;
      padding:0 22px;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(242,240,236,0.86);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 0;
    }

    .brand{ line-height:1.05; }
    .brand .name{
      font-family:var(--serif);
      font-weight:700;
      letter-spacing:0.01em;
      font-size:20px;
    }
    .brand .sub{
      font-size:11px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(0,0,0,0.55);
      margin-top:4px;
    }

    nav{
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    nav a{
      font-size:13px;
      color:rgba(0,0,0,0.72);
      border-bottom:1px solid transparent;
      padding-bottom:2px;
    }

    nav a:hover{
      border-bottom-color:rgba(0,0,0,0.35);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 16px;
      border-radius:999px;
      font-weight:800;
      font-size:13px;
      border:1px solid rgba(17,17,17,0.18);
      background:transparent;
      color:rgba(0,0,0,0.86);
    }

    .btn.primary{
      background:var(--btn);
      color:var(--btnText);
      border-color:var(--btn);
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0); }
