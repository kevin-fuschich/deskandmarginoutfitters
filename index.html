<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Desk & Margin Outfitters</title>
  <meta name="description" content="Partner-led advisory helping leadership teams build intentional culture and protect cohesion through growth and transition." />

  <style>
    :root{
      --bg:#f6f4ef;
      --paper:#fffdf8;
      --ink:#111111;
      --muted:#3d3d3d;
      --line:rgba(17,17,17,0.12);

      --serif:Georgia,"Times New Roman",serif;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;

      --max:1000px;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:var(--bg);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }

    a{text-decoration:none;color:inherit;}
    a:hover{text-decoration:underline;}

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:60px 20px 80px;
    }

    /* Top Bar */

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      padding:24px 20px;
      background:white;
      border-bottom:1px solid var(--line);
    }

    .brand .name{
      font-family:var(--serif);
      font-weight:700;
      font-size:18px;
      letter-spacing:0.2px;
    }

    .brand .tag{
      font-size:13px;
      color:var(--muted);
      margin-top:2px;
    }

    .pill{
      font-size:12px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
      white-space:nowrap;
    }

    .btn{
      padding:10px 18px;
      border-radius:999px;
      border:1px solid var(--line);
      font-size:14px;
    }

    .btn.primary{
      background:var(--ink);
      color:white;
      border-color:var(--ink);
    }

    /* Hero */

    .hero{
      position:relative;
      background-image:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=2000&q=80');
      background-size:cover;
      background-position:center;
      color:white;
      padding:140px 20px;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.35);
    }

    .hero-inner{
      position:relative;
      max-width:900px;
      margin:0 auto;
    }

    .kicker{
      text-transform:uppercase;
      letter-spacing:0.15em;
      font-size:12px;
      color:rgba(255,255,255,0.75);
      margin-bottom:18px;
    }

    h1{
      font-family:var(--serif);
      font-size:clamp(40px,4.5vw,60px);
      line-height:1.05;
      margin:0 0 22px;
      max-width:22ch;
    }

    .lead{
      font-size:20px;
      max-width:65ch;
      color:rgba(255,255,255,0.92);
    }

    .hero-note{
      font-size:14px;
      margin-top:20px;
      color:rgba(255,255,255,0.75);
    }

    .hero-cta{
      margin-top:32px;
    }

    /* Sections */

    section{
      padding:80px 0;
      border-top:1px solid var(--line);
    }

    .section-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:0 20px;
    }

    .strongline{
      font-weight:700;
      margin-bottom:16px;
      font-size:18px;
    }

    p{
      max-width:70ch;
      color:var(--muted);
      margin-bottom:16px;
    }

    ul{
      max-width:70ch;
      padding-left:20px;
      color:var(--muted);
    }

    li{margin-bottom:8px;}

    h2{
      font-family:var(--serif);
      font-size:26px;
      margin-bottom:16px;
    }

    .step{
      margin-bottom:22px;
    }

    .step strong{
      display:block;
      font-weight:800;
      margin-bottom:6px;
    }

    /* Contact */

    form{
      margin-top:20px;
      max-width:700px;
      display:grid;
      gap:14px;
    }

    input, textarea{
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      font:inherit;
    }

    textarea{min-height:130px;}

    footer{
      margin-top:80px;
      padding:40px 20px;
      border-top:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
    }
  </style>
</head>

<body>

  <div class="top">
    <div class="brand">
      <div class="name">Desk & Margin Outfitters</div>
      <div class="tag">Partner-led advisory for leadership teams building intentional culture.</div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <span class="pill">Confidential • Limited engagements</span>
