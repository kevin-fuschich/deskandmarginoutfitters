<section id="contact" style="background:#1a1a1a;color:#f4f1eb;padding:140px 24px;border-top:none;">
  <div class="section-inner">
    <h2 style="color:#f4f1eb;">Request a private introduction</h2>

    <p style="max-width:65ch;color:rgba(244,241,235,0.85);">
      If you are aligning teams at scale — or preparing the enterprise for what’s ahead —
      let’s begin a confidential conversation.
    </p>

    <form action="#" method="post" style="margin-top:32px;">
      <input type="text" name="name" placeholder="Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="organization" placeholder="Organization (optional)" />
      <textarea name="message" placeholder="What are you building or navigating?" required></textarea>
      <button class="btn primary" type="submit" style="background:#f4f1eb;color:#111;border-color:#f4f1eb;">
        Send
      </button>
    </form>

    <p style="font-size:12px;color:rgba(244,241,235,0.6);margin-top:18px;">
      Boutique model. Partner-led. Limited concurrent engagements.
    </p>
  </div>
</section>
